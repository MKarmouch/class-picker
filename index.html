      .import-mode { display: flex; gap: 12px; flex-wrap: wrap; }
      .import-mode label, .toggle-row label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
      .manual-card textarea { min-height: 110px; resize: vertical; }
      .main { flex: 1; padding: 28px 40px; display: flex; flex-direction: column; gap: 24px; }

      .shuffle-indicator { font-size: 32px; font-weight: 700; color: rgba(99, 102, 241, 0.75); animation: pulse 0.9s infinite ease-in-out; }

          authModeCreate: "Create account",
          authLoginBtn: "Sign in with email",
          authSignupBtn: "Create my account",
          authPasswordsNoMatch: "Passwords do not match. Check both fields.",
          authPasswordTooShort: "Password must be at least 6 characters.",
          authHintConfirmEmpty: "Type the same password again to confirm.",
          authHintMatch: "Passwords match.",
          authHintMismatch: "Passwords do not match yet.",
          authErrEmailInUse: "That email is already registered. Try signing in instead.",
          authErrInvalidEmail: "That doesn’t look like a valid email address.",
          authErrWeakPassword: "That password is too weak. Try a stronger one.",
          authErrBadCredentials: "Email or password is incorrect.",
          authSubmitting: "Please wait…",
          authGoogleBtn: "Continue with Google",
          authOr: "OR",
          authSignout: "Sign Out",
        },
      };

      const translate = (lang, key, params = {}) => {
        const dictionary = TEXT[lang] || TEXT.ar;
        const fallback = TEXT.ar[key] || key;
        let template = dictionary[key] || fallback;
        return Object.keys(params).reduce((acc, paramKey) => acc.replace(new RegExp(`\\{${paramKey}\\}`, "g"), params[paramKey]), template);
      };

      const generateId = (prefix = "id") => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(16).slice(2, 8)}`;
      const normalizeName = (name) => name.replace(/\ufeff/g, "").replace(/\r/g, "").trim();
      const dedupeNames = (names) => {
        const seen = new Set();
        const result = [];
        names.forEach((raw) => {
          const name = normalizeName(raw);
          if (name && !seen.has(name)) { seen.add(name); result.push(name); }
        });
        return result;
      };
      const parseCSV = (text) => {
        if (!text) return [];
        return text.replace(/\r\n/g, "\n").split("\n").map((line) => line.split(/[;,]/)[0]).map(normalizeName).filter(Boolean);
      };
      const formatTimestamp = (lang, isoString) => {
        const locale = LOCALE_MAP[lang] || "en-US";
        const options = { hour: "2-digit", minute: "2-digit", second: "2-digit", year: "numeric", month: "short", day: "numeric" };
        const date = isoString ? new Date(isoString) : new Date();
        if (Number.isNaN(date.getTime())) return isoString || "";
        return date.toLocaleString(locale, options);
      };

      const mapAuthError = (lang, err) => {
        const code = err && err.code;
        if (code === "auth/email-already-in-use") return translate(lang, "authErrEmailInUse");
        if (code === "auth/invalid-email") return translate(lang, "authErrInvalidEmail");
        if (code === "auth/weak-password") return translate(lang, "authErrWeakPassword");
        if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-credential" || code === "auth/user-disabled") return translate(lang, "authErrBadCredentials");
        return err.message || String(err);
      };

      function AuthScreen({ language, setLanguage }) {
        const [mode, setMode] = useState("signin");
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [passwordConfirm, setPasswordConfirm] = useState("");
        const [error, setError] = useState("");
        const [pending, setPending] = useState(false);
        const t = (key) => translate(language, key);

        const isSignup = mode === "signup";
        const passwordsMatch = password.length > 0 && password === passwordConfirm;
        const confirmTouched = passwordConfirm.length > 0;
        const confirmMismatch = confirmTouched && password !== passwordConfirm;

        const switchMode = (next) => {
          setMode(next);
          setError("");
          setPasswordConfirm("");
          if (next === "signin") setPassword("");
        };

        const handleLogin = (e) => {
          e.preventDefault();
          setError("");
          setPending(true);
          auth.signInWithEmailAndPassword(email.trim(), password)
            .catch((err) => setError(mapAuthError(language, err)))
            .finally(() => setPending(false));
        };

        const handleSignup = (e) => {
          e.preventDefault();
          setError("");
          if (password !== passwordConfirm) {
            setError(t("authPasswordsNoMatch"));
            return;
          }
          if (password.length < 6) {
            setError(t("authPasswordTooShort"));
            return;
          }
          setPending(true);
          auth.createUserWithEmailAndPassword(email.trim(), password)
            .catch((err) => setError(mapAuthError(language, err)))
            .finally(() => setPending(false));
        };

        const handleGoogleLogin = () => {
          setError("");
          auth.signInWithPopup(googleProvider).catch((err) => setError(mapAuthError(language, err)));
        };

        const signupSubmitDisabled = pending || !email.trim() || password.length < 6 || !passwordsMatch;
        const signinSubmitDisabled = pending || !email.trim() || !password;

        return (
          <div className="auth-container" dir={language === "ar" ? "rtl" : "ltr"}>
            <div className="auth-card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <h2 style={{ margin: 0, flex: 1, minWidth: 140 }}>{isSignup ? t("authTitleCreate") : t("authTitle")}</h2>
                <select style={{ padding: "8px 12px", borderRadius: "10px", border: "1px solid #cbd5e1", fontSize: 14, background: "#f8fafc" }} value={language} onChange={(e) => setLanguage(e.target.value)}>
                  <option value="ar">العربية</option>
                  <option value="en">English</option>
                </select>
              </div>
              {isSignup && <p className="auth-subtitle">{t("authSubtitleCreate")}</p>}

              <div className="auth-mode-switch" role="tablist" aria-label={language === "ar" ? "وضع الدخول" : "Sign-in mode"}>
                <button type="button" role="tab" aria-selected={!isSignup} className={!isSignup ? "active" : ""} onClick={() => switchMode("signin")}>{t("authModeSignIn")}</button>
                <button type="button" role="tab" aria-selected={isSignup} className={isSignup ? "active" : ""} onClick={() => switchMode("signup")}>{t("authModeCreate")}</button>
              </div>

              <button type="button" className="btn-google" onClick={handleGoogleLogin}>
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                {t("authGoogleBtn")}
              </button>
              <div className="divider">{t("authOr")}</div>

              <form className="auth-fields" onSubmit={isSignup ? handleSignup : handleLogin} noValidate>
                <div className="auth-field-wrap">
                  <label htmlFor="auth-email">{t("authEmail")}</label>
                  <input id="auth-email" type="email" autoComplete="email" placeholder={t("authEmail")} value={email} onChange={(e) => { setEmail(e.target.value); setError(""); }} />
                </div>
                <div className="auth-field-wrap">
                  <label htmlFor="auth-password">{t("authPassword")}</label>
                  <input id="auth-password" type="password" autoComplete={isSignup ? "new-password" : "current-password"} placeholder={t("authPassword")} value={password} onChange={(e) => { setPassword(e.target.value); setError(""); }} className={isSignup && confirmTouched && confirmMismatch ? "input-error" : ""} />
                </div>
                {isSignup && (
                  <div className="auth-field-wrap">
                    <label htmlFor="auth-password-confirm">{t("authConfirmPassword")}</label>
                    <input id="auth-password-confirm" type="password" autoComplete="new-password" placeholder={t("authConfirmPassword")} value={passwordConfirm} onChange={(e) => { setPasswordConfirm(e.target.value); setError(""); }} className={confirmMismatch ? "input-error" : passwordsMatch && password.length > 0 ? "input-ok" : ""} />
                    <div className={`auth-field-hint ${passwordsMatch ? "ok" : confirmMismatch ? "bad" : "neutral"}`} aria-live="polite">
                      {!confirmTouched && t("authHintConfirmEmpty")}
                      {confirmTouched && passwordsMatch && t("authHintMatch")}
                      {confirmTouched && confirmMismatch && t("authHintMismatch")}
                    </div>
                  </div>
                )}
                {error && <div className="error" role="alert">{error}</div>}
                <button type="submit" className="auth-primary-submit" disabled={isSignup ? signupSubmitDisabled : signinSubmitDisabled}>
                  {pending ? t("authSubmitting") : isSignup ? t("authSignupBtn") : t("authLoginBtn")}
                </button>
              </form>
            </div>
          </div>
        );
      }

      function App() {
        const [user, setUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);
        const [dataLoaded, setDataLoaded] = useState(false);
        const [language, setLanguage] = useState("ar");
        const [classes, setClasses] = useState([]);
        const [selectedClassId, setSelectedClassId] = useState(null);
        const [newClassName, setNewClassName] = useState("");
        const [importMode, setImportMode] = useState("replace");
        const [allowRepeats, setAllowRepeats] = useState(false);
        const [selectionCount, setSelectionCount] = useState(1);
        const [displayNames, setDisplayNames] = useState([]);
        const [message, setMessage] = useState("");
        const [shuffleNumber, setShuffleNumber] = useState(null);
        const [isSelecting, setIsSelecting] = useState(false);
        const [bulkNames, setBulkNames] = useState("");
        const [rtlDisplay, setRtlDisplay] = useState(true);
        const [undoStack, setUndoStack] = useState([]);

        const t = (key, params) => translate(language, key, params);

        useEffect(() => {
          const unsubscribe = auth.onAuthStateChanged((currentUser) => {
            setUser(currentUser);
            if (!currentUser) { setClasses([]); setSelectedClassId(null); setDataLoaded(false); }
            setAuthLoading(false);
          });
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!user) return;
          db.collection("users").doc(user.uid).get().then(doc => {
            if (doc.exists) {
              const data = doc.data();
              setClasses(data.classes || []);
              setSelectedClassId(data.selectedClassId || null);
              setLanguage(data.language || "ar");
              setRtlDisplay(data.language !== "en");
            }
            setDataLoaded(true);
          });
        }, [user]);

        useEffect(() => {
          if (user && dataLoaded) {
            db.collection("users").doc(user.uid).set({ classes, selectedClassId, language });
          }
        }, [classes, selectedClassId, language, user, dataLoaded]);

        useEffect(() => {
          if (!message) return;
          const timer = setTimeout(() => setMessage(""), 4500);
          return () => clearTimeout(timer);
        }, [message]);

        useEffect(() => {
          if (classes.length === 0) { if (selectedClassId !== null) setSelectedClassId(null); return; }
          if (!classes.some(cls => cls.id === selectedClassId)) setSelectedClassId(classes[0].id);
        }, [classes, selectedClassId]);

        const currentClass = useMemo(() => classes.find(cls => cls.id === selectedClassId) || null, [classes, selectedClassId]);

        if (authLoading) return <div style={{textAlign: 'center', padding: '50px'}}>Loading...</div>;
        if (!user) return <AuthScreen language={language} setLanguage={setLanguage} />;

        const handleSignOut = () => auth.signOut();

        const pickRandomNames = (source, count, repeat) => {
          if (!source || source.length === 0) return [];
          const picks = [];
          if (repeat) { for (let i = 0; i < count; i++) picks.push(source[Math.floor(Math.random() * source.length)]); }
          else { const pool = [...source]; for (let i = 0; i < count && pool.length > 0; i++) { const idx = Math.floor(Math.random() * pool.length); picks.push(pool[idx]); pool.splice(idx, 1); } }
          return picks;
        };

        const addClass = () => {
          const name = normalizeName(newClassName);
          if (!name) return setMessage(t("msgEnterClassName"));
          const newClass = { id: generateId("cls"), name, students: [], remaining: [], history: [] };
          setClasses(prev => [...prev, newClass]);
          setSelectedClassId(newClass.id);
          setNewClassName("");
          setMessage(t("msgClassCreated", { name }));
        };

        const deleteClass = (id) => {
          const target = classes.find(cls => cls.id === id);
          if (!target || !window.confirm(t("msgConfirmDelete", { name: target.name }))) return;
          setClasses(prev => prev.filter(cls => cls.id !== id));
          setUndoStack([]);
          setMessage(t("msgClassDeleted", { name: target.name }));
        };

        const updateClassById = (classId, updater) => setClasses(prev => prev.map(cls => cls.id === classId ? updater(cls) : cls));

        const handleImportCSV = (event) => {
          const file = event.target.files?.[0]; if (!file || !currentClass) return;
          const reader = new FileReader();
          reader.onload = (loadEvent) => {
            const names = dedupeNames(parseCSV(loadEvent.target.result));
            if (!names.length) return setMessage(t("msgNoNamesInFile"));
            if (importMode === "replace") { updateClassById(currentClass.id, (cls) => ({ ...cls, students: names, remaining: names, history: [] })); setMessage(t("msgListReplaced", { count: names.length })); }
            else { updateClassById(currentClass.id, (cls) => { const newNames = names.filter(n => !cls.students.includes(n)); setMessage(newNames.length ? t("msgNamesMerged", { count: newNames.length }) : t("msgAllNamesExist")); return { ...cls, students: dedupeNames([...cls.students, ...newNames]), remaining: dedupeNames([...cls.remaining, ...newNames]) }; }); }
          };
          reader.readAsText(file, "utf-8");
          event.target.value = "";
        };

        // Added Excel Handling Function
        const handleImportExcel = (event) => {
          const file = event.target.files?.[0]; if (!file || !currentClass) return;
          const reader = new FileReader();
          reader.onload = (loadEvent) => {
            try {
              const workbook = XLSX.read(loadEvent.target.result, { type: "array" });
              const sheet = workbook.Sheets[workbook.SheetNames[0]];
              const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
              // Find the header row by looking for the student name column marker
              let dataStartRow = -1;
              let nameColIndex = 3; // default: column D (index 3)
              for (let i = 0; i < rows.length; i++) {
                const rowStr = rows[i].join(" ");
                if (rowStr.includes("إسم التلميذ") || rowStr.includes("اسم التلميذ")) {
                  dataStartRow = i + 1;
                  const idx = rows[i].findIndex(cell => String(cell).includes("إسم التلميذ") || String(cell).includes("اسم التلميذ"));
                  if (idx !== -1) nameColIndex = idx;
                  break;
                }
              }
              if (dataStartRow === -1) dataStartRow = 16; // fallback: skip first 16 rows
              const names = dedupeNames(
                rows.slice(dataStartRow)
                  .map(row => normalizeName(String(row[nameColIndex] || "")))
                  .filter(Boolean)
              );
              if (!names.length) return setMessage(t("msgNoNamesInFile"));
              if (importMode === "replace") {
                updateClassById(currentClass.id, (cls) => ({ ...cls, students: names, remaining: names, history: [] }));
                setMessage(t("msgListReplaced", { count: names.length }));
              } else {
                updateClassById(currentClass.id, (cls) => {
                  const newNames = names.filter(n => !cls.students.includes(n));
                  setMessage(newNames.length ? t("msgNamesMerged", { count: newNames.length }) : t("msgAllNamesExist"));
                  return { ...cls, students: dedupeNames([...cls.students, ...newNames]), remaining: dedupeNames([...cls.remaining, ...newNames]) };
                });
              }
            } catch (err) {
              setMessage(t("msgNoNamesInFile"));
            }
          };
          reader.readAsArrayBuffer(file);
          event.target.value = "";
        };

        const handleAddBulkNames = () => {
          if (!currentClass) return; const rawEntries = bulkNames.split(/\n|,/).map(normalizeName).filter(Boolean);
          if (!rawEntries.length) return setMessage(t("msgEnterAtLeastOneName"));
          const uniqueNew = rawEntries.filter(n => !currentClass.students.includes(n));
          if (!uniqueNew.length) return setMessage(t("msgAllNamesExist"));
          updateClassById(currentClass.id, cls => ({ ...cls, students: dedupeNames([...cls.students, ...uniqueNew]), remaining: dedupeNames([...cls.remaining, ...uniqueNew]) }));
          setBulkNames(""); setMessage(t("msgAddedNames", { count: uniqueNew.length }));
        };

        const handleResetPool = () => { if (currentClass) updateClassById(currentClass.id, cls => ({ ...cls, remaining: [...cls.students] })); setMessage(t("msgResetPool")); };

        const handleSelection = () => {
          if (!currentClass) return setMessage(t("msgCreateClassFirst"));
          const pool = allowRepeats ? currentClass.students : currentClass.remaining;
          if (!pool.length) return setMessage(allowRepeats ? t("msgClassHasNoNames") : t("msgAllStudentsDrawn"));
          if (!allowRepeats && selectionCount > pool.length) return setMessage(t("msgCannotSelectCount", { requested: selectionCount, available: pool.length }));
          setIsSelecting(true); setMessage("");
          const interval = setInterval(() => { setDisplayNames(pickRandomNames(pool, Math.min(selectionCount, pool.length), true)); setShuffleNumber(Math.floor(Math.random() * 900) + 100); }, 90);
          setTimeout(() => {
            clearInterval(interval);
            const finalNames = pickRandomNames(pool, Math.min(selectionCount, pool.length), allowRepeats);
            setDisplayNames(finalNames); setShuffleNumber(null); setIsSelecting(false);
            const historyEntry = { id: generateId("draw"), names: finalNames, recordedAt: new Date().toISOString(), selectionCount, allowRepeats };
            updateClassById(currentClass.id, cls => ({ ...cls, history: [historyEntry, ...cls.history].slice(0, HISTORY_LIMIT), remaining: allowRepeats ? cls.remaining : cls.remaining.filter(n => !finalNames.includes(n)) }));
            setUndoStack(prev => [...prev, { classId: currentClass.id, names: finalNames, entryId: historyEntry.id, allowRepeats }]);
            if (!allowRepeats && (pool.length - finalNames.length === 0)) setMessage(t("msgAllStudentsDrawnReset"));
          }, 2000);
        };

        const handleUndo = () => {
          if (!undoStack.length) return setMessage(t("msgUndoNotAvailable"));
          const lastEntry = undoStack[undoStack.length - 1]; setUndoStack(prev => prev.slice(0, -1));
          setClasses(prev => prev.map(cls => cls.id === lastEntry.classId ? { ...cls, history: cls.history.filter(i => i.id !== lastEntry.entryId), remaining: lastEntry.allowRepeats ? cls.remaining : dedupeNames([...cls.remaining, ...lastEntry.names]) } : cls));
          setSelectedClassId(lastEntry.classId); setDisplayNames(lastEntry.names); setMessage(t("msgUndoDone"));
        };

        return (
          <div className="app-shell">
            <aside className="sidebar" dir={language === "ar" ? "rtl" : "ltr"}>
              <h1><span>★</span>{t("appTitle")}</h1>
              <div className="language-toggle">
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <label>{t("languageLabel")}</label>
                  <button onClick={handleSignOut} className="danger-btn" style={{padding:'4px 8px', fontSize:'12px'}}>{t("authSignout")}</button>
                </div>
                <select value={language} onChange={(e) => setLanguage(e.target.value)}><option value="ar">العربية</option><option value="en">English</option></select>
              </div>
              <div className="add-class-card">
                <label>{t("classNameLabel")}</label>
                <input placeholder={t("newClassPlaceholder")} value={newClassName} onChange={e => setNewClassName(e.target.value)} />
                <button className="primary-btn" onClick={addClass}>{t("addClassButton")}</button>
              </div>
              <section className="class-list">
                {classes.length === 0 && <p className="empty-state">{t("noClassesPlaceholder")}</p>}
                {classes.map(cls => (
                  <article key={cls.id} className={`class-card ${cls.id === selectedClassId ? "active" : ""}`}>
                    <header><h3>{cls.name}</h3><div className="control-row" style={{gap:"6px"}}><button className="ghost-btn" onClick={() => setSelectedClassId(cls.id)}>{t("selectButton")}</button><button className="danger-btn" onClick={() => deleteClass(cls.id)}>{t("deleteButton")}</button></div></header>
                    <div className="class-meta"><span>{t("studentsLabel")}: {cls.students.length}</span><span>{t("remainingLabel")}: {cls.remaining.length}</span></div>
                  </article>
                ))}
              </section>
              {currentClass && <>
                <div className="import-card">
                  <h2>{t("importSectionTitle")}</h2>
                  <div className="import-mode"><label><input type="radio" value="replace" checked={importMode==="replace"} onChange={e=>setImportMode(e.target.value)} />{t("importModeReplace")}</label><label><input type="radio" value="merge" checked={importMode==="merge"} onChange={e=>setImportMode(e.target.value)} />{t("importModeMerge")}</label></div>
                  <button className="ghost-btn" onClick={()=>document.getElementById("csv-input").click()}>{t("uploadCsvButton")}</button>
                  <input id="csv-input" type="file" accept=".csv" style={{display:"none"}} onChange={handleImportCSV} />
                  
                  {/* Added Excel (Massar) Upload Button */}
                  <button className="ghost-btn" onClick={()=>document.getElementById("excel-input").click()}>{t("uploadExcelButton")}</button>
                  <input id="excel-input" type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleImportExcel} />
                  
                  <button className="ghost-btn" onClick={handleResetPool}>{t("resetNoRepeatButton")}</button>
                </div>
                <div className="manual-card"><h2>{t("manualSectionTitle")}</h2><textarea placeholder={t("manualPlaceholder")} value={bulkNames} onChange={e=>setBulkNames(e.target.value)} /><button className="ghost-btn" onClick={handleAddBulkNames}>{t("addNamesButton")}</button></div>
              </>}
            </aside>
            <main className="main" dir={language === "ar" ? "rtl" : "ltr"}>
              <section className="controls">
                <div className="control-group"><label>{t("selectionCountLabel")}</label><div className="control-row"><input type="number" min="1" max="10" value={selectionCount} onChange={e=>setSelectionCount(Math.max(1,Math.min(10,Number(e.target.value)||1)))} /><span style={{fontSize:"13px"}}>{t("selectionCountHint")}</span></div></div>
                <div className="control-group"><label>{t("drawOptionsLabel")}</label><div className="control-row"><label><input type="checkbox" checked={allowRepeats} onChange={e=>setAllowRepeats(e.target.checked)} />{t("allowRepeatsLabel")}</label></div><div className="control-row"><label><input type="checkbox" checked={rtlDisplay} onChange={e=>setRtlDisplay(e.target.checked)} />{t("rtlLabel")}</label></div></div>
                <div className="control-group"><label>{t("actionsLabel")}</label><div className="control-row"><button className="primary-btn" onClick={handleSelection} disabled={isSelecting||!currentClass}>{t("drawNowButton")}</button><button className="ghost-btn" onClick={handleUndo} disabled={!undoStack.length}>{t("undoButton")}</button></div><div className="control-row"><button className="ghost-btn" onClick={()=>updateClassById(currentClass.id, c=>({...c,history:[]}))}>{t("clearHistoryButton")}</button></div></div>
                {shuffleNumber !== null && <div className="control-group"><label>{t("shuffleLabel")}</label><div className="shuffle-indicator">{shuffleNumber}</div></div>}
                {message && <div className="message">{message}</div>}
              </section>
              <section className="display-area"><div className={`name-display count-${displayNames.length||1}`} style={{direction: rtlDisplay ? "rtl" : "ltr"}}>{displayNames.length ? displayNames.map((n, i) => <div key={i} className="student-name">{n}</div>) : <div className="placeholder">{t("displayPlaceholder")}</div>}</div></section>
              <section className="history"><h2>{t("historySectionTitle")}</h2><ul className="history-list">{currentClass?.history.map(e => (<li key={e.id} className="history-item"><div className="history-names">{e.names.join(" · ")}</div><div className="history-meta"><div>{formatTimestamp(language, e.recordedAt)}</div><div>{t("historyCountLabel")}: {e.selectionCount}</div></div></li>))}</ul></section>
            </main>
          </div>
        );
      }
      ReactDOM.render(<App />, document.getElementById("artifact_react"));
    </script>
  </body>
</html>
