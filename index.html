      const translate = (lang, key, params = {}) => {
        const dictionary = TEXT[lang] || TEXT.ar;
        const fallback = TEXT.ar[key] || key;
        let template = dictionary[key] || fallback;
        return Object.keys(params).reduce(
          (acc, paramKey) => acc.replace(new RegExp(`\\{${paramKey}\\}`, "g"), params[paramKey]),
          template
        );
      };

      const generateId = (prefix = "id") =>
        `${prefix}-${Date.now().toString(36)}-${Math.random().toString(16).slice(2, 8)}`;
      const normalizeName = (name) => name.replace(/\ufeff/g, "").replace(/\r/g, "").trim();
      const dedupeNames = (names) => {
        const seen = new Set();
        const result = [];
        names.forEach((raw) => {
          const name = normalizeName(raw);
          if (name && !seen.has(name)) { seen.add(name); result.push(name); }
        });
        return result;
      };
      const parseCSV = (text) => {
        if (!text) return [];
        return text.replace(/\r\n/g, "\n").split("\n").map((line) => line.split(/[;,]/)[0]).map(normalizeName).filter(Boolean);
      };
      const formatTimestamp = (lang, isoString) => {
        const locale = LOCALE_MAP[lang] || "en-US";
        const options = { hour: "2-digit", minute: "2-digit", second: "2-digit", year: "numeric", month: "short", day: "numeric" };
        const date = isoString ? new Date(isoString) : new Date();
        if (Number.isNaN(date.getTime())) return isoString || "";
        return date.toLocaleString(locale, options);
      };

      // ==========================================

      function AuthScreen({ language, setLanguage }) {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");
        const t = (key) => translate(language, key);

        const handleLogin = (e) => {
          e.preventDefault();
          auth.signInWithEmailAndPassword(email, password).catch(err => setError(err.message));
        };

        const handleSignup = (e) => {
          e.preventDefault();
          auth.createUserWithEmailAndPassword(email, password).catch(err => setError(err.message));
        };

        return (
          <div className="auth-container" dir={language === "ar" ? "rtl" : "ltr"}>
            <div className="auth-card">
              <h2>{t("authTitle")}</h2>
              
              <select 
                style={{ padding: '8px', borderRadius: '8px', border: '1px solid #ccc', marginBottom: '10px' }}
                value={language} 
                onChange={(e) => setLanguage(e.target.value)}
              >
                <option value="ar">العربية</option>
                <option value="en">English</option>
              </select>

              {error && <div className="error">{error}</div>}
              
              <input type="email" placeholder={t("authEmail")} value={email} onChange={e => setEmail(e.target.value)} />
              <input type="password" placeholder={t("authPassword")} value={password} onChange={e => setPassword(e.target.value)} />
              
              <div className="btn-group">
                <button className="btn-login" onClick={handleLogin}>{t("authLoginBtn")}</button>
                <button className="btn-signup" onClick={handleSignup}>{t("authSignupBtn")}</button>
              </div>
            </div>
          </div>
        );

      function App() {
        const [user, setUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);
        const [dataLoaded, setDataLoaded] = useState(false);

        const [language, setLanguage] = useState("ar");
        const [classes, setClasses] = useState([]);
        const [selectedClassId, setSelectedClassId] = useState(null);
        
        const [newClassName, setNewClassName] = useState("");
        const [importMode, setImportMode] = useState("replace");
        const [allowRepeats, setAllowRepeats] = useState(false);
        const [selectionCount, setSelectionCount] = useState(1);
        const [displayNames, setDisplayNames] = useState([]);
        const [message, setMessage] = useState("");
        const [shuffleNumber, setShuffleNumber] = useState(null);
        const [isSelecting, setIsSelecting] = useState(false);
        const [bulkNames, setBulkNames] = useState("");
        const [rtlDisplay, setRtlDisplay] = useState(true);
        const [undoStack, setUndoStack] = useState([]);

        const t = (key, params) => translate(language, key, params);

        // 1. Listen for Firebase User Logins/Logouts
        useEffect(() => {
          const unsubscribe = auth.onAuthStateChanged((currentUser) => {
            setUser(currentUser);
            if (!currentUser) {
              setClasses([]);
              setSelectedClassId(null);
              setDataLoaded(false);
            }
            setAuthLoading(false);
          });
          return () => unsubscribe();
        }, []);

        // 2. Load Data from Firestore when user logs in
        useEffect(() => {
          if (!user) return;
          const loadData = async () => {
            try {
              const docSnap = await db.collection("users").doc(user.uid).get();
              if (docSnap.exists) {
                const data = docSnap.data();
                setClasses(data.classes || []);
                setSelectedClassId(data.selectedClassId || null);
                setLanguage(data.language || "ar");
                setRtlDisplay(data.language !== "en");
              }
            } catch (error) {
              console.error("Error loading data:", error);
            }
            setDataLoaded(true);
          };
          loadData();
        }, [user]);

        // 3. Save Data to Firestore whenever classes, language, or selectedClass changes
        useEffect(() => {
          if (user && dataLoaded) {
            db.collection("users").doc(user.uid).set({
              classes,
              selectedClassId,
              language
            }).catch(err => console.error("Error saving data:", err));
          }
        }, [classes, selectedClassId, language, user, dataLoaded]);

        // Clear messages
        useEffect(() => {
          if (!message) return;
          const timer = setTimeout(() => setMessage(""), 4500);
          return () => clearTimeout(timer);
        }, [message]);

        // Auto-select class
        useEffect(() => {
          if (classes.length === 0) {
            if (selectedClassId !== null) setSelectedClassId(null);
            return;
          }
          if (!classes.some((cls) => cls.id === selectedClassId)) {
            setSelectedClassId(classes[0].id);
          }
        }, [classes, selectedClassId]);

        const currentClass = useMemo(
          () => classes.find((cls) => cls.id === selectedClassId) || null,
          [classes, selectedClassId]
        );

        // Auth loading screen
        if (authLoading) return <div style={{textAlign: 'center', padding: '50px'}}>Loading...</div>;
        
        // Show login screen if not logged in
        if (!user) return <AuthScreen language={language} setLanguage={setLanguage} />;

        const handleSignOut = () => auth.signOut();

        const pickRandomNames = (source, count, repeat) => {
          if (!Array.isArray(source) || source.length === 0) return [];
          const picks = [];
          if (repeat) {
            for (let i = 0; i < count; i += 1) {
              const idx = Math.floor(Math.random() * source.length);
              picks.push(source[idx]);
            }
          } else {
            const pool = [...source];
            for (let i = 0; i < count && pool.length > 0; i += 1) {
              const idx = Math.floor(Math.random() * pool.length);
              picks.push(pool[idx]);
              pool.splice(idx, 1);
            }
          }
          return picks;
        };

        const addClass = () => {
          const name = normalizeName(newClassName);
          if (!name) return setMessage(t("msgEnterClassName"));
          const newClass = { id: generateId("cls"), name, students: [], remaining: [], history: [] };
          setClasses((prev) => [...prev, newClass]);
          setSelectedClassId(newClass.id);
          setNewClassName("");
          setMessage(t("msgClassCreated", { name }));
        };

        const deleteClass = (id) => {
          const target = classes.find((cls) => cls.id === id);
          if (!target) return;
          if (!window.confirm(t("msgConfirmDelete", { name: target.name }))) return;
          setClasses((prev) => prev.filter((cls) => cls.id !== id));
          setUndoStack([]);
          setMessage(t("msgClassDeleted", { name: target.name }));
        };

        const updateClassById = (classId, updater) => {
          setClasses((prev) => prev.map((cls) => (cls.id === classId ? updater(cls) : cls)));
        };

        const handleImportCSV = (event) => {
          const file = event.target.files?.[0];
          if (!file || !currentClass) return;
          const reader = new FileReader();
          reader.onload = (loadEvent) => {
            const text = loadEvent.target.result;
            const names = dedupeNames(parseCSV(text));
            if (!names.length) return setMessage(t("msgNoNamesInFile"));
            if (importMode === "replace") {
              updateClassById(currentClass.id, (cls) => ({ ...cls, students: names, remaining: names, history: [] }));
              setMessage(t("msgListReplaced", { count: names.length }));
            } else {
              updateClassById(currentClass.id, (cls) => {
                const newNames = names.filter((name) => !cls.students.includes(name));
                setMessage(newNames.length ? t("msgNamesMerged", { count: newNames.length }) : t("msgAllNamesExist"));
                return {
                  ...cls,
                  students: dedupeNames([...cls.students, ...newNames]),
                  remaining: dedupeNames([...cls.remaining, ...newNames]),
                };
              });
            }
          };
          reader.readAsText(file, "utf-8");
          event.target.value = "";
        };

        const handleAddBulkNames = () => {
          if (!currentClass) return;
          const rawEntries = bulkNames.split(/\n|,/).map(normalizeName).filter(Boolean);
          if (!rawEntries.length) return setMessage(t("msgEnterAtLeastOneName"));
          const uniqueNew = rawEntries.filter((name) => !currentClass.students.includes(name));
          if (!uniqueNew.length) return setMessage(t("msgAllNamesExist"));
          updateClassById(currentClass.id, (cls) => ({
            ...cls, students: dedupeNames([...cls.students, ...uniqueNew]), remaining: dedupeNames([...cls.remaining, ...uniqueNew]),
          }));
          setBulkNames("");
          setMessage(t("msgAddedNames", { count: uniqueNew.length }));
        };

        const handleResetPool = () => {
          if (!currentClass) return;
          updateClassById(currentClass.id, (cls) => ({ ...cls, remaining: [...cls.students] }));
          setMessage(t("msgResetPool"));
        };

        const handleSelection = () => {
          if (!currentClass) return setMessage(t("msgCreateClassFirst"));
          const pool = allowRepeats ? currentClass.students : currentClass.remaining;
          if (!pool.length) return setMessage(allowRepeats ? t("msgClassHasNoNames") : t("msgAllStudentsDrawn"));
          if (!allowRepeats && selectionCount > pool.length) {
            return setMessage(t("msgCannotSelectCount", { requested: selectionCount, available: pool.length }));
          }
          setIsSelecting(true);
          setMessage("");
          const frameRate = 90;
          const interval = setInterval(() => {
            setDisplayNames(pickRandomNames(pool, Math.min(selectionCount, pool.length), true));
            setShuffleNumber(Math.floor(Math.random() * 900) + 100);
          }, frameRate);
          setTimeout(() => {
            clearInterval(interval);
            const finalNames = pickRandomNames(pool, Math.min(selectionCount, pool.length), allowRepeats);
            setDisplayNames(finalNames);
            setShuffleNumber(null);
            setIsSelecting(false);
            const historyEntry = { id: generateId("draw"), names: finalNames, recordedAt: new Date().toISOString(), selectionCount, allowRepeats };
            updateClassById(currentClass.id, (cls) => {
              return {
                ...cls,
                history: [historyEntry, ...cls.history].slice(0, HISTORY_LIMIT),
                remaining: allowRepeats ? cls.remaining : cls.remaining.filter((name) => !finalNames.includes(name)),
              };
            });
            setUndoStack((prev) => [...prev, { classId: currentClass.id, names: finalNames, entryId: historyEntry.id, allowRepeats }]);
            if (!allowRepeats && (pool.length - finalNames.length === 0)) setMessage(t("msgAllStudentsDrawnReset"));
          }, 2000);
        };

        const handleUndo = () => {
          if (!undoStack.length) return setMessage(t("msgUndoNotAvailable"));
          const lastEntry = undoStack[undoStack.length - 1];
          setUndoStack((prev) => prev.slice(0, prev.length - 1));
          setClasses((prev) => prev.map((cls) => {
            if (cls.id !== lastEntry.classId) return cls;
            return {
              ...cls,
              history: cls.history.filter((item) => item.id !== lastEntry.entryId),
              remaining: lastEntry.allowRepeats ? cls.remaining : dedupeNames([...cls.remaining, ...lastEntry.names]),
            };
          }));
          setSelectedClassId(lastEntry.classId);
          setDisplayNames(lastEntry.names);
          setMessage(t("msgUndoDone"));
        };

        const clearHistory = () => {
          if (!currentClass) return;
          updateClassById(currentClass.id, (cls) => ({ ...cls, history: [] }));
          setMessage(t("msgHistoryCleared"));
        };

        const renameClass = (cls) => {
          const proposed = window.prompt(t("renamePrompt"), cls.name);
          const name = normalizeName(proposed || "");
          if (!name || name === cls.name) return;
          updateClassById(cls.id, (item) => ({ ...item, name }));
          setMessage(t("msgRenameDone", { name }));
        };

        const canUndo = undoStack.length > 0;
        const messageDirection = language === "ar" ? "rtl" : "ltr";

        return (
          <div className="app-shell">
            <aside className="sidebar" dir={language === "ar" ? "rtl" : "ltr"}>
              <h1>
                <span>★</span>
                {t("appTitle")}
              </h1>

              <div className="language-toggle">
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                  <label htmlFor="language-select">{t("languageLabel")}</label>
                  <button onClick={handleSignOut} className="danger-btn" style={{padding: '4px 8px', fontSize: '12px'}}>{t("authSignout")}</button>
                </div>
                <select id="language-select" value={language} onChange={(e) => setLanguage(e.target.value)}>
                  <option value="ar">{t("languageArabic")}</option>
                  <option value="en">{t("languageEnglish")}</option>
                </select>
              </div>

              <div className="add-class-card">
                <label htmlFor="new-class">{t("classNameLabel")}</label>
                <input id="new-class" placeholder={t("newClassPlaceholder")} value={newClassName} onChange={(e) => setNewClassName(e.target.value)} />
                <button className="primary-btn" onClick={addClass}>{t("addClassButton")}</button>
              </div>

              <section className="class-list">
                {classes.length === 0 && <p className="empty-state">{t("noClassesPlaceholder")}</p>}
                {classes.map((cls) => (
                  <article key={cls.id} className={`class-card ${cls.id === selectedClassId ? "active" : ""}`}>
                    <header>
                      <h3>{cls.name}</h3>
                      <div className="control-row" style={{ gap: "6px" }}>
                        <button className="ghost-btn" onClick={() => setSelectedClassId(cls.id)}>{t("selectButton")}</button>
                        <button className="ghost-btn" onClick={() => renameClass(cls)}>{t("renameButton")}</button>
                        <button className="danger-btn" onClick={() => deleteClass(cls.id)}>{t("deleteButton")}</button>
                      </div>
                    </header>
                    <div className="class-meta">
                      <span>{t("studentsLabel")}: {cls.students.length}</span>
                      <span>{t("remainingLabel")}: {cls.remaining.length}{!allowRepeats && cls.remaining.length === 0 ? " ✓" : ""}</span>
                    </div>
                  </article>
                ))}
              </section>

              {currentClass && (
                <>
                  <div className="import-card">
                    <h2 style={{ margin: 0, fontSize: "17px" }}>{t("importSectionTitle")}</h2>
                    <div className="import-mode">
                      <label><input type="radio" value="replace" checked={importMode === "replace"} onChange={(e) => setImportMode(e.target.value)} />{t("importModeReplace")}</label>
                      <label><input type="radio" value="merge" checked={importMode === "merge"} onChange={(e) => setImportMode(e.target.value)} />{t("importModeMerge")}</label>
                    </div>
                    <button className="ghost-btn" onClick={() => document.getElementById("csv-input").click()}>{t("uploadCsvButton")}</button>
                    <input id="csv-input" type="file" accept=".csv" style={{ display: "none" }} onChange={handleImportCSV} />
                    <button className="ghost-btn" onClick={handleResetPool}>{t("resetNoRepeatButton")}</button>
                  </div>

                  <div className="manual-card">
                    <h2 style={{ margin: 0, fontSize: "17px" }}>{t("manualSectionTitle")}</h2>
                    <textarea placeholder={t("manualPlaceholder")} value={bulkNames} onChange={(e) => setBulkNames(e.target.value)} />
                    <button className="ghost-btn" onClick={handleAddBulkNames}>{t("addNamesButton")}</button>
                  </div>
                </>
              )}
            </aside>

            <main className="main" dir={language === "ar" ? "rtl" : "ltr"}>
              <section className="controls">
                <div className="control-group">
                  <label>{t("selectionCountLabel")}</label>
                  <div className="control-row">
                    <input type="number" min="1" max="10" value={selectionCount} onChange={(e) => setSelectionCount(Math.max(1, Math.min(10, Number(e.target.value) || 1)))} />
                    <span style={{ fontSize: "13px", color: "#4b5563" }}>{t("selectionCountHint")}</span>
                  </div>
                </div>

                <div className="control-group">
                  <label>{t("drawOptionsLabel")}</label>
                  <div className="control-row"><label><input type="checkbox" checked={allowRepeats} onChange={(e) => setAllowRepeats(e.target.checked)} />{t("allowRepeatsLabel")}</label></div>
                  <div className="control-row"><label><input type="checkbox" checked={rtlDisplay} onChange={(e) => setRtlDisplay(e.target.checked)} />{t("rtlLabel")}</label></div>
                </div>

                <div className="control-group">
                  <label>{t("actionsLabel")}</label>
                  <div className="control-row">
                    <button className="primary-btn" onClick={handleSelection} disabled={isSelecting || !currentClass}>{t("drawNowButton")}</button>
                    <button className="ghost-btn" onClick={handleUndo} disabled={!canUndo}>{t("undoButton")}</button>
                  </div>
                  <div className="control-row">
                    <button className="ghost-btn" onClick={clearHistory}>{t("clearHistoryButton")}</button>
                  </div>
                </div>

                {shuffleNumber !== null && (
                  <div className="control-group">
                    <label>{t("shuffleLabel")}</label>
                    <div className="shuffle-indicator">{shuffleNumber}</div>
                  </div>
                )}

                {message && <div className="message" style={{ direction: messageDirection }}>{message}</div>}
              </section>

              <section className="display-area">
                <div className={`name-display count-${displayNames.length || 1}`} style={{ direction: rtlDisplay ? "rtl" : "ltr" }}>
                  {displayNames.length ? displayNames.map((name, index) => <div key={`${name}-${index}`} className="student-name">{name}</div>) : <div className="placeholder">{t("displayPlaceholder")}</div>}
                </div>
              </section>

              <section className="history" dir={language === "ar" ? "rtl" : "ltr"}>
                <div className="control-row" style={{ justifyContent: "space-between" }}>
                  <h2 style={{ margin: 0 }}>{t("historySectionTitle")}</h2>
                  <span style={{ fontSize: "13px", color: "#64748b" }}>{t("historyLimitNote", { limit: HISTORY_LIMIT })}</span>
                </div>
                <ul className="history-list">
                  {currentClass && currentClass.history.length === 0 && <li className="placeholder" style={{ fontSize: "16px" }}>{t("historyEmptyPlaceholder")}</li>}
                  {currentClass?.history.map((entry) => (
                    <li key={entry.id} className="history-item">
                      <div className="history-names">{entry.names.join(" · ")}</div>
                      <div className="history-meta" style={{ textAlign: language === "ar" ? "left" : "right" }}>
                        <div>{formatTimestamp(language, entry.recordedAt)}</div>
                        <div>{t("historyCountLabel")}: {entry.selectionCount} | {entry.allowRepeats ? t("historyWithRepeats") : t("historyWithoutRepeats")}</div>
                      </div>
                    </li>
                  ))}
                </ul>
              </section>

              {currentClass && (
                <section className="student-list" dir={language === "ar" ? "rtl" : "ltr"}>
                  <div className="control-row" style={{ justifyContent: "space-between" }}>
                    <h2 style={{ margin: 0 }}>{t("studentsSectionTitle")}</h2>
                    <div className="stats-row">
                      <span>{t("statsTotal")} <strong>{currentClass.students.length}</strong></span>
                      <span>{t("statsRemaining")} <strong>{currentClass.remaining.length}</strong></span>
                    </div>
                  </div>
                  <div className="student-grid">
                    {currentClass.students.length === 0 && <div className="placeholder" style={{ gridColumn: "1 / -1" }}>{t("studentListEmpty")}</div>}
                    {currentClass.students.map((name) => <div key={name} className="student-chip">{name}</div>)}
                  </div>
                </section>
              )}
            </main>
          </div>
        );
      }

      try {
        ReactDOM.render(<App />, document.getElementById("artifact_react"));
      } catch (error) {
        document.getElementById("error-container").style.display = "block";
        document.getElementById("error-container").textContent = "حدث خطأ أثناء تحميل التطبيق. تحقق من وحدة التحكم.";
        console.error(error);
      }
    </script>
  </body>
</html>
